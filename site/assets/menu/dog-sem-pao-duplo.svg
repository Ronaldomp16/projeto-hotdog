<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGradD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9a866"/>
      <stop offset="100%" stop-color="#b9803f"/>
    </linearGradient>
    <linearGradient id="sausageGrad3D" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1573a"/>
      <stop offset="100%" stop-color="#a83726"/>
    </linearGradient>
  </defs>

  <ellipse cx="200" cy="224" rx="146" ry="14" fill="#000" opacity="0.14"/>

  <!-- box body (um pouco mais cheia) -->
  <path d="M86 112 L314 112 L290 224 C290 234 250 240 200 240 C150 240 110 234 110 224 Z"
        fill="url(#boxGradD)" stroke="#4a2e14" stroke-width="7" stroke-linejoin="round"/>

  <!-- box front folds -->
  <path d="M136 124 L124 216" stroke="#8f5b28" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <path d="M264 124 L276 216" stroke="#8f5b28" stroke-width="4" opacity="0.5" stroke-linecap="round"/>

  <!-- sausage chunks (mais pedaços pra dobrar a sensacao de porcao) -->
  <g stroke="#2c150c" stroke-width="6">
    <rect x="110" y="88" width="56" height="42" rx="21" fill="url(#sausageGrad3D)"/>
    <rect x="172" y="82" width="60" height="46" rx="23" fill="url(#sausageGrad3D)"/>
    <rect x="238" y="88" width="56" height="42" rx="21" fill="url(#sausageGrad3D)"/>
    <rect x="130" y="122" width="58" height="42" rx="21" fill="url(#sausageGrad3D)"/>
    <rect x="196" y="118" width="60" height="44" rx="22" fill="url(#sausageGrad3D)"/>
    <rect x="150" y="156" width="58" height="40" rx="20" fill="url(#sausageGrad3D)"/>
  </g>

  <!-- molho drizzle -->
  <path d="M110 100 Q140 88 168 100 Q196 112 224 100 Q252 88 282 100"
        fill="none" stroke="#f9d020" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cheese sauce pooling -->
  <path d="M140 168 Q165 192 195 170 Q225 148 255 172 Q270 184 258 198 L135 198 Q126 182 140 168 Z"
        fill="#ffe08a" stroke="#3a2210" stroke-width="5" stroke-linejoin="round" opacity="0.95"/>

  <!-- corn flecks -->
  <circle cx="148" cy="212" r="5" fill="#f9d020" stroke="#171310" stroke-width="2"/>
  <circle cx="196" cy="220" r="5" fill="#f9d020" stroke="#171310" stroke-width="2"/>
  <circle cx="244" cy="212" r="5" fill="#f9d020" stroke="#171310" stroke-width="2"/>
  <circle cx="172" cy="226" r="5" fill="#f9d020" stroke="#171310" stroke-width="2"/>
  <circle cx="222" cy="226" r="5" fill="#f9d020" stroke="#171310" stroke-width="2"/>
</svg>

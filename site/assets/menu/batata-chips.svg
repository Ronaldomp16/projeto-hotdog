    <rect x="150" y="66" width="20" height="88" rx="6" fill="url(#fryGrad)" transform="rotate(-8 160 110)"/>
    <rect x="178" y="54" width="20" height="100" rx="6" fill="url(#fryGrad)" transform="rotate(-2 188 104)"/>
    <rect x="204" y="50" width="20" height="104" rx="6" fill="url(#fryGrad)" transform="rotate(4 214 102)"/>
    <rect x="230" y="60" width="20" height="92" rx="6" fill="url(#fryGrad)" transform="rotate(10 240 106)"/>
    <rect x="126" y="76" width="18" height="80" rx="6" fill="url(#fryGrad)" transform="rotate(-16 135 116)"/>
    <rect x="256" y="72" width="18" height="82" rx="6" fill="url(#fryGrad)" transform="rotate(15 265 113)"/>
  </g>

  <!-- box -->
  <path d="M96 132 L304 132 L282 226 C282 236 246 242 200 242 C154 242 118 236 118 226 Z"
